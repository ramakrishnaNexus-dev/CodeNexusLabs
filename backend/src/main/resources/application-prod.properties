server.port=${PORT:8080}

# ============================================
# SUPABASE POSTGRESQL - PRODUCTION CONFIG
# ============================================

# Database connection (Render will inject these via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Supabase free allows 30 connections, use 8)
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Don't run data.sql on production
spring.sql.init.mode=never

# JWT
app.jwtSecret=${JWT_SECRET:CodeNexusLabsSecretKeyForJWT2024VeryLongAndSecure123456789}
app.jwtExpirationMs=86400000

# ============================================
# BREVO SMTP CONFIGURATION (Permanently Free - 300 emails/day)
# ============================================

# SMTP Server Settings
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=aa75d1001@smtp-brevo.com
spring.mail.password=${BREVO_SMTP_KEY}

# SMTP Properties
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp-relay.brevo.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Admin email (where notifications go)
admin.email=codenexuslabs.dev@gmail.com

# ============================================
# FILE UPLOADS
# ============================================

spring.web.resources.static-locations=file:uploads/
spring.mvc.static-path-pattern=/**


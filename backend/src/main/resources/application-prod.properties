server.port=${PORT:8080}

# ============================================
# SUPABASE POSTGRESQL - PRODUCTION CONFIG
# ============================================

# Database connection
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Don't run data.sql on production
spring.sql.init.mode=never

# JWT
app.jwtSecret=${JWT_SECRET:CodeNexusLabsSecretKeyForJWT2024VeryLongAndSecure123456789}
app.jwtExpirationMs=86400000

# ============================================
# FILE UPLOADS — NEEDED FOR RESUME BUILDER
# ============================================
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.enabled=true
spring.web.resources.static-locations=file:uploads/
spring.mvc.static-path-pattern=/**

# ============================================
# BREVO EMAIL CONFIGURATION
# ============================================
brevo.api.key=${BREVO_API_KEY}

# Admin email
admin.email=codenexuslabs.dev@gmail.com


server.port=${PORT:8080}

# ============================================
# SUPABASE POSTGRESQL - PRODUCTION CONFIG
# ============================================

# Database connection (Render will inject these via env vars)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (Supabase free allows 30 connections, use 8)
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Don't run data.sql on production (tables already exist or JPA creates them)
spring.sql.init.mode=never

# JWT
app.jwtSecret=${JWT_SECRET:CodeNexusLabsSecretKeyForJWT2024VeryLongAndSecure123456789}
app.jwtExpirationMs=86400000

# Email - SendGrid
spring.mail.host=${MAIL_HOST:smtp.sendgrid.net}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:apikey}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Uploads
spring.web.resources.static-locations=file:uploads/
spring.mvc.static-path-pattern=/**

